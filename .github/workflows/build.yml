name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run dist
        env:
          ELECTRON_CACHE: ${{ runner.toolCache }}/electron
          
      - name: List output
        run: Get-ChildItem release/ -Recurse -File | Select-Object Name,Length
        continue-on-error: true
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mojing-Windows
          path: release/
